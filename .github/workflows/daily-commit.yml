# Added the email to the workflow name
name: Daily Automated Commit 24f2006360@ds.study.iitm.ac.in

# Added a run-name to explicitly name the execution
run-name: Daily Run for 24f2006360@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '30 14 * * *'
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      # Kept the email in the step name as originally requested
      - name: Update log for 24f2006360@ds.study.iitm.ac.in
        run: |
          echo "Automated daily run completed on $(date)" >> devsync_log.txt

      - name: Save and push the commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add devsync_log.txt
          git commit -m "Automated daily commit"
          git push
